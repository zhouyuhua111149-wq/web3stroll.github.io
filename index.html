<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Stroll | 探索去中心化</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 400px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #00d2ff; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 1.1rem; color: #ccc; line-height: 1.6; }
        .btn-group { margin-top: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid #00d2ff;
            color: #00d2ff;
        }
        .btn:hover {
            background: #00d2ff;
            color: #0f0c29;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Web3 Stroll</h1>
        <p>欢迎来到我的数字领地<br>在这里，我们探索区块链与未来的可能</p>
        <div class="btn-group">
            <a href="https://github.com/zhouyuhua111149-wq" class="btn">进入查找工具与项目</a>
            <a href="mailto:zhouyuhua111149@gmail.com" class="btn">联系站长</a>
        </div>
    </div>
</body>
</html>
